<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#0d1117"/>

  <!-- Connection lines from hub to ESP chips -->
  <line x1="50" y1="50" x2="16" y2="18" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="50" y1="50" x2="84" y2="18" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="50" y1="50" x2="14" y2="78" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="50" y1="50" x2="86" y2="78" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>
  <line x1="50" y1="50" x2="50" y2="82" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- ESP chips at corners -->
  <!-- Top-left -->
  <rect x="4" y="8" width="22" height="14" rx="2.5" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="7" y1="8" x2="7" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="12" y1="8" x2="12" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="17" y1="8" x2="17" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="22" y1="8" x2="22" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <text x="15" y="18" text-anchor="middle" fill="#3fb950" font-size="5" font-family="monospace" font-weight="bold">ESP</text>

  <!-- Top-right -->
  <rect x="74" y="8" width="22" height="14" rx="2.5" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="77" y1="8" x2="77" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="82" y1="8" x2="82" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="87" y1="8" x2="87" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="92" y1="8" x2="92" y2="5" stroke="#8b949e" stroke-width="1.2"/>
  <text x="85" y="18" text-anchor="middle" fill="#3fb950" font-size="5" font-family="monospace" font-weight="bold">ESP</text>

  <!-- Bottom-left -->
  <rect x="3" y="72" width="22" height="14" rx="2.5" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="6" y1="86" x2="6" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="11" y1="86" x2="11" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="16" y1="86" x2="16" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="21" y1="86" x2="21" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <text x="14" y="82" text-anchor="middle" fill="#3fb950" font-size="5" font-family="monospace" font-weight="bold">ESP</text>

  <!-- Bottom-right -->
  <rect x="75" y="72" width="22" height="14" rx="2.5" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <line x1="78" y1="86" x2="78" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="83" y1="86" x2="83" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="88" y1="86" x2="88" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <line x1="93" y1="86" x2="93" y2="89" stroke="#8b949e" stroke-width="1.2"/>
  <text x="86" y="82" text-anchor="middle" fill="#3fb950" font-size="5" font-family="monospace" font-weight="bold">ESP</text>

  <!-- Bottom-center -->
  <rect x="39" y="84" width="22" height="12" rx="2.5" fill="#1c2128" stroke="#3fb950" stroke-width="1.2"/>
  <text x="50" y="93" text-anchor="middle" fill="#3fb950" font-size="5" font-family="monospace" font-weight="bold">ESP</text>

  <!-- Central Hub circle -->
  <circle cx="50" cy="50" r="17" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>

  <!-- WiFi symbol inside hub -->
  <circle cx="50" cy="56" r="2.5" fill="#58a6ff"/>
  <path d="M43.5 51 Q50 44 56.5 51" stroke="#58a6ff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M39 46.5 Q50 36 61 46.5" stroke="#58a6ff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>
</svg>
